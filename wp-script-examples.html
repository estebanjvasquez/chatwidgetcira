<!-- ══════════════════════════════════════════════════════════════
     OPCIÓN 2: MODO INTEGRADO  (inline) — con DIVI Builder
     El chat se incrusta dentro de un módulo de Divi.
     El alto del módulo en el editor de Divi controla el tamaño.

     ── PASOS EN EL DIVI BUILDER ──────────────────────────────────

     1. CREAR EL CONTENEDOR EN DIVI
        En la página donde quieres el chat, abre el Divi Builder
        (botón azul "Usar Divi Builder" o "Activar Visual Builder").

        Opción A — Módulo Código (recomendada, más directa):
          • Añade una nueva Sección → Fila de 1 columna.
          • Dentro de la fila, haz clic en el ícono "+" e inserta
            un módulo "Código" (Code Module).
          • En el campo de contenido del módulo escribe únicamente:
              <div id="cira-chat"></div>
          • En las opciones del módulo → pestaña "Avanzado" →
            sección "CSS" → campo "ID de CSS" escribe:
              cira-chat-wrap
            (esto es solo para identificarlo visualmente en Divi;
             el ID funcional está en el div interno de arriba)

        Opción B — Módulo Texto u otro módulo de contenido:
          • Inserta un módulo Texto en la posición deseada.
          • Haz clic en el ícono de lápiz para editar → cambia
            al editor de texto plano (pestaña "Texto" en TinyMCE)
            y escribe únicamente:
              <div id="cira-chat"></div>
          • Guarda el módulo.

     2. DEFINIR EL ALTO DEL CONTENEDOR
        El widget llena el 100 % del alto del contenedor, así que
        debes fijar un alto explícito.

        • Selecciona el módulo (Código o Texto) → ícono de lápiz.
        • Pestaña "Avanzado" → sección "CSS personalizado" →
          campo "CSS principal del elemento" → escribe:
            height: 600px;
          (ajusta el valor según necesites, p. ej. 500px, 80vh)
        • Alternativamente, en la pestaña "Diseño" del módulo,
          si está disponible la opción "Alto", escríbelo ahí.

        NOTA: Si el módulo está dentro de una Fila, también
        puedes fijar el alto en la Fila: edita la Fila →
        "Diseño" → "Alto personalizado" → actívalo y pon el valor.

     3. VERIFICAR EL ID EN EL DOM
        • Guarda / publica la página y ábrela en el navegador.
        • Clic derecho sobre la zona donde debe aparecer el chat →
          "Inspeccionar".
        • Confirma que existe un elemento <div id="cira-chat">.
        • Si Divi agregó un wrapper extra, copia el id o class
          del contenedor más cercano con dimensiones definidas
          y úsalo como mountSelector en el script (ver paso 4).

     4. AJUSTAR mountSelector SI ES NECESARIO
        El valor por defecto es "#cira-chat" (el div que escribiste).
        Si Divi renombra o envuelve el elemento, cambia mountSelector
        al selector real que viste en el inspector del navegador.
        Ejemplos habituales en Divi:
          "#cira-chat"                         → id del div interno (caso normal)
          ".et_pb_code_inner"                  → clase interna del Code Module
          "#cira-chat-wrap .et_pb_code_inner"  → selector combinado módulo + inner

     ── NOTA SOBRE EL VISUAL BUILDER ────────────────────────────
        El widget NO se renderiza dentro del Visual Builder de Divi
        (el editor de arrastrar y soltar que se abre sobre la página
        en vivo). Esto es normal: el Visual Builder suspende los
        scripts externos para no interferir con la edición.

        El widget aparecerá correctamente al:
          • Ver la página publicada en una pestaña normal del navegador
          • Usar la vista previa del Backend Builder
            (Backend Builder → botón ojo "Vista Previa")

        Para verificar el alto del contenedor antes de publicar,
        usa la Vista Previa del backend o publica la página en
        modo borrador y revísala en una pestaña separada.
